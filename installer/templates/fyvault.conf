# FyVault Agent — `url` must include the /api/v1 prefix (matches SDKs and CLI).

[cloud]
url = "https://api.fyvault.com/api/v1"
token = ""

[agent]
heartbeat_interval = 300
log_level = "info"

[keyring]
namespace = "fyvault"

[network]
# eBPF attach target; set to your primary interface (e.g. eth0) or leave empty to skip TC attach
interface = ""
